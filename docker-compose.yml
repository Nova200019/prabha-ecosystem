services:
  prabha-web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://prabha:prabha@db:5432/prabha
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: prabha
      POSTGRES_PASSWORD: prabha
      POSTGRES_DB: prabha
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prabha"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
